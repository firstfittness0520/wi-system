<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>初練 WI 接待順位系統 2026年6月</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f2f0eb;--surface:#fff;--surface2:#faf9f7;
  --border:#e4e1da;--border2:#ccc9c0;
  --text:#181714;--text2:#5e5c55;--text3:#9c9a92;
  --gold:#c9a030;--gold-bg:#fdf7e8;--gold-bd:#e8d490;
  --silver:#7f95a6;--silver-bg:#eff3f6;--silver-bd:#bfcfd8;
  --bronze:#a86c34;--bronze-bg:#fdf0e4;--bronze-bd:#e8be96;
  --red:#d94040;--red-bg:#fef0f0;--red-bd:#f0b8b8;
  --green:#2a7a50;--green-bg:#edf6f1;--green-bd:#9fd4bc;
  --blue:#2d5fc4;--blue-bg:#edf2fc;--blue-bd:#9ab8e8;
  --orange:#c97020;--orange-bg:#fef4e8;
  --r:12px;--rsm:7px;--rxs:4px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

/* NAV */
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;position:sticky;top:0;z-index:200;height:52px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.nav-brand{font-size:15px;font-weight:900;letter-spacing:.04em;padding-right:1rem;border-right:1px solid var(--border);margin-right:.875rem;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.nav-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);}
.nav-tabs{display:flex;height:100%;}
.nav-tab{display:flex;align-items:center;padding:0 .875rem;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;user-select:none;gap:5px;}
.nav-tab:hover{color:var(--text);background:rgba(0,0,0,.02);}
.nav-tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500;}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:.5rem;}
.chip{font-size:11px;border-radius:20px;padding:3px 9px;white-space:nowrap;}
.chip-ver{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-bd);font-weight:600;}
.chip-date{background:var(--bg);color:var(--text3);border:1px solid var(--border);font-family:'DM Mono',monospace;}

/* PAGES */
.page{display:none;padding:1.25rem 1.5rem;max-width:980px;margin:0 auto;animation:fadeIn .18s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.125rem 1.375rem;margin-bottom:.875rem;box-shadow:var(--shadow);}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem;padding-bottom:.75rem;border-bottom:1px solid var(--border);}
.card-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.625rem;margin-bottom:.875rem;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.875rem 1.125rem;box-shadow:var(--shadow);}
.stat .lbl{font-size:10px;color:var(--text3);margin-bottom:.2rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.stat .val{font-size:22px;font-weight:700;color:var(--text);line-height:1.2;}
.stat .val.sm{font-size:14px;font-weight:600;margin-top:3px;}
.stat .sub{font-size:10px;color:var(--text3);margin-top:2px;font-family:'DM Mono',monospace;}

/* MODE BADGE */
.mode-badge{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:700;}
.mode-may{background:var(--silver-bg);color:var(--silver);border:1px solid var(--silver-bd);}
.mode-jun{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);}

/* DATE PICKER */
.dpicker{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:1.125rem;}
.db{width:39px;height:45px;border:1px solid var(--border2);border-radius:var(--rsm);background:var(--surface);color:var(--text);cursor:pointer;font-size:12px;font-weight:600;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;position:relative;transition:all .1s;}
.db .wd{font-size:9px;color:var(--text3);font-weight:400;}
.db:hover{border-color:var(--text);background:var(--bg);}
.db.active{background:var(--text);color:#fff;border-color:var(--text);}
.db.active .wd{color:rgba(255,255,255,.5);}
.db.today{border-color:var(--blue);color:var(--blue);}
.db.today .wd{color:var(--blue);opacity:.7;}
.db.today.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.db.has-off::after{content:'';position:absolute;bottom:3px;right:3px;width:4px;height:4px;border-radius:50%;background:var(--red);}
.db.active.has-off::after{background:rgba(255,150,150,.8);}
.db.we{color:var(--red);}
.db.we .wd{color:var(--red);opacity:.6;}
.legend{display:flex;align-items:center;gap:12px;font-size:11px;color:var(--text3);margin-bottom:.75rem;flex-wrap:wrap;}

/* RANK LIST */
.rank-day-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:.875rem;display:flex;align-items:center;gap:8px;}
.rank-day-title small{font-size:11px;color:var(--text3);font-weight:400;}
.rank-list{display:flex;flex-direction:column;gap:4px;}
.rrow{display:grid;grid-template-columns:40px 1fr auto;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--surface);transition:box-shadow .1s;}
.rrow:hover{box-shadow:var(--shadow);}
.rrow.r1{background:var(--gold-bg);border-color:var(--gold-bd);}
.rrow.r2{background:var(--silver-bg);border-color:var(--silver-bd);}
.rrow.r3{background:var(--bronze-bg);border-color:var(--bronze-bd);}
.rbadge{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--bg);color:var(--text2);border:1px solid var(--border);}
.rb1{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-bd);}
.rb2{background:var(--silver-bg);color:var(--silver);border-color:var(--silver-bd);}
.rb3{background:var(--bronze-bg);color:var(--bronze);border-color:var(--bronze-bd);}
.rname{font-size:14px;font-weight:600;}
.rname-zh{font-size:11px;color:var(--text3);margin-left:4px;font-weight:400;}
.rscore{text-align:right;}
.rscore .amt{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;}
.rscore .lbl{font-size:10px;color:var(--text3);}
.off-div{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);padding:7px 0 3px;border-top:1px dashed var(--border2);margin-top:5px;}
.rrow-off{display:grid;grid-template-columns:40px 1fr auto;align-items:center;gap:10px;padding:6px 14px;opacity:.33;}
.off-pill{font-size:10px;background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);border-radius:20px;padding:1px 8px;font-weight:600;}
.empty-st{padding:2.5rem;text-align:center;color:var(--text3);font-size:13px;}
.empty-st .ico{font-size:28px;display:block;margin-bottom:.625rem;}

/* SCORE PAGE */
.alert{padding:9px 13px;border-radius:var(--rsm);font-size:12px;font-weight:500;margin-bottom:.75rem;display:none;align-items:center;gap:7px;}
.alert.show{display:flex;}
.alert-ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.625rem;margin-bottom:.75rem;}
.fg{display:flex;flex-direction:column;gap:3px;}
.fg label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;}
.fg input,.fg select{padding:8px 10px;border:1px solid var(--border2);border-radius:var(--rsm);font-size:13px;font-family:inherit;color:var(--text);background:var(--surface);outline:none;transition:border-color .12s;}
.fg input:focus,.fg select:focus{border-color:var(--text);box-shadow:0 0 0 3px rgba(24,23,20,.08);}
.fg input::placeholder{color:var(--text3);}
.btn{padding:8px 18px;border:1px solid var(--border2);border-radius:var(--rsm);font-size:13px;font-family:inherit;font-weight:600;cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:5px;}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text);}
.btn-primary:hover{opacity:.82;}
.btn-ghost{background:transparent;color:var(--text2);}
.btn-ghost:hover{background:var(--bg);}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:var(--red-bd);}
.btn-danger:hover{background:var(--red);color:#fff;}
.btn-sm{padding:4px 11px;font-size:11px;}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:.25rem;}
table.dt{width:100%;border-collapse:collapse;font-size:13px;}
table.dt th{text-align:left;padding:6px 9px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap;}
table.dt td{padding:8px 9px;border-bottom:1px solid var(--border);vertical-align:middle;}
table.dt tr:last-child td{border-bottom:none;}
table.dt tbody tr:hover td{background:var(--surface2);}

/* SCHEDULE GRID */
.sch-outer{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.sch-t{border-collapse:collapse;font-size:11px;white-space:nowrap;}
.sch-t th{padding:4px 3px;text-align:center;border:1px solid var(--border);background:var(--surface2);font-weight:600;color:var(--text2);min-width:30px;}
.sch-t th.nc{text-align:left;min-width:100px;padding:4px 9px;}
.sch-t th.weh{background:rgba(217,64,64,.07);color:var(--red);}
.sch-t td{padding:2px;border:1px solid var(--border);text-align:center;}
.sch-t td.nc{padding:5px 9px;text-align:left;font-weight:600;background:var(--surface2);position:sticky;left:0;z-index:1;border-right:2px solid var(--border2);}
.sch-t td.wed{background:rgba(217,64,64,.03);}
.sch-cell{width:26px;height:24px;border-radius:var(--rxs);border:1px solid var(--border2);background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text3);transition:all .08s;margin:auto;}
.sch-cell.off{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.sch-cell:hover{border-color:var(--text2);}
.sch-cell.off:hover{background:var(--red);color:#fff;}
.info-note{font-size:11px;color:var(--text3);margin-bottom:.75rem;line-height:1.6;}
.info-note strong{color:var(--text2);}

@media(max-width:600px){
  .page{padding:1rem;}
  .nav{padding:0 1rem;}
  .form-grid{grid-template-columns:1fr;}
  .stats-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand"><div class="nav-dot"></div>初練 WI</div>
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="nav('rank')">📊 接待順位</div>
    <div class="nav-tab" onclick="nav('score')">💰 業績輸入</div>
    <div class="nav-tab" onclick="nav('schedule')">📅 休假設定</div>
  </div>
  <div class="nav-right">
    <span class="chip chip-ver">2026年6月</span>
    <span class="chip chip-date" id="nav-date">—</span>
  </div>
</nav>

<!-- ── RANK ── -->
<div class="page active" id="page-rank">
  <div class="stats-grid" id="stats"></div>
  <div class="card">
    <div class="card-header">
      <div class="card-title">📅 日期選擇</div>
      <span class="mode-badge mode-may" id="mode-badge">依5月業績排序</span>
    </div>
    <div class="legend">
      <span><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red);margin-right:3px;vertical-align:middle;"></span>當日有人休假</span>
      <span style="border:1px solid var(--blue);color:var(--blue);border-radius:3px;padding:1px 6px;font-size:10px;font-weight:600;">今天</span>
      <span style="color:var(--red);font-size:11px;">紅字＝週末</span>
    </div>
    <div class="dpicker" id="dpicker"></div>
    <div class="rank-day-title" id="rank-title">—</div>
    <div class="rank-list" id="rank-list"></div>
  </div>
</div>

<!-- ── SCORE ── -->
<div class="page" id="page-score">
  <div class="alert alert-ok" id="score-alert">✅ 業績新增成功，排序已更新</div>
  <div class="card">
    <div class="card-header">
      <div class="card-title">💰 新增6月業績</div>
    </div>
    <div class="form-grid">
      <div class="fg"><label>日期（6月幾號）</label><input type="number" id="s-day" min="2" max="30" placeholder="2 ～ 30"></div>
      <div class="fg"><label>主教練</label><select id="s-coach"></select></div>
      <div class="fg"><label>課堂總金額（元）</label><input type="number" id="s-amt" placeholder="例：53568" min="1"></div>
      <div class="fg"><label>會員姓名（選填）</label><input type="text" id="s-note" placeholder="備註"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="addScore()">＋ 新增業績</button>
      <span id="jun-total" style="font-size:12px;color:var(--text3);"></span>
    </div>
  </div>
  <div class="card">
    <div class="card-header">
      <div class="card-title">📋 6月業績明細</div>
    </div>
    <div style="overflow-x:auto;">
      <table class="dt">
        <thead><tr><th>日期</th><th>教練</th><th>會員</th><th>金額</th><th></th></tr></thead>
        <tbody id="score-body"><tr><td colspan="5" style="text-align:center;color:var(--text3);padding:2rem;">尚無業績資料</td></tr></tbody>
      </table>
    </div>
  </div>
  <div class="card">
    <div class="card-title" style="margin-bottom:.875rem;">📌 5月基準業績（6/1排序依據）</div>
    <table class="dt"><thead><tr><th>#</th><th>教練</th><th>5月累計</th></tr></thead><tbody id="may-body"></tbody></table>
  </div>
</div>

<!-- ── SCHEDULE ── -->
<div class="page" id="page-schedule">
  <div class="alert alert-ok" id="sch-alert">✅ 休假設定已儲存</div>
  <div class="card">
    <div class="card-header">
      <div class="card-title">📅 6月休假設定</div>
      <div class="btn-row">
        <button class="btn btn-ghost btn-sm" onclick="resetDefault()">↩ 還原預設</button>
        <button class="btn btn-primary btn-sm" onclick="saveSchedule()">💾 儲存</button>
      </div>
    </div>
    <p class="info-note">
      <strong>點格子</strong>切換休假／出勤。<strong>「還原預設」</strong>回到班表原始資料。<strong>「儲存」</strong>後排序即時更新。
    </p>
    <div class="legend">
      <span><span style="display:inline-block;width:12px;height:12px;background:var(--red-bg);border:1px solid var(--red);border-radius:2px;vertical-align:middle;margin-right:3px;"></span>休假</span>
      <span><span style="display:inline-block;width:12px;height:12px;background:transparent;border:1px solid var(--border2);border-radius:2px;vertical-align:middle;margin-right:3px;"></span>出勤</span>
    </div>
    <div class="sch-outer"><div id="sch-wrap"></div></div>
  </div>
  <div class="card">
    <div class="card-title" style="margin-bottom:.75rem;">⚡ 批次設定</div>
    <div class="form-grid">
      <div class="fg"><label>教練</label><select id="b-coach"></select></div>
      <div class="fg"><label>休假日（逗號分隔，如：1,7,14）</label><input type="text" id="b-days" placeholder="1,7,14,21,28"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="batchSet()">套用休假</button>
      <button class="btn btn-ghost" onclick="batchClear()">清除該教練全部休假</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════
// 基礎資料
// ════════════════════════════════════════
var WD6    = ['一','二','三','四','五','六','日'];
var FIRST6 = new Date(2026,5,1).getDay(); // 6/1=週一=1

var COACHES = [
  {name:'Peggy', zh:'呂佩儀', may:458556},
  {name:'Trevor',zh:'黃任桂', may:342456},
  {name:'Manson',zh:'許銘晨', may:341064},
  {name:'Jim',   zh:'李宥昇', may:314952},
  {name:'Kenny', zh:'楊育勝', may:243648},
  {name:'Alan',  zh:'游子昇', may:230904},
  {name:'Jon',   zh:'巫承澤', may:193904},
  {name:'Eason', zh:'許哲軒', may:136848},
  {name:'Ian',   zh:'林彥廷', may:130992},
  {name:'Parker',zh:'戴璟佑', may:76224},
  {name:'Shawn', zh:'張梓祥', may:75624},
  {name:'Ann',   zh:'邱子晏', may:0, joinDay:13},
];

// ════════════════════════════════════════
// 6月預設休假班表（從截圖逐格解析）
// ════════════════════════════════════════
var DEFAULT_OFF = {
  Kenny:  [7,8,15,16,20,21,22,29,30],
  Parker: [2,5,6,7,12,19,26,29],
  Alan:   [5,7,13,14,19,20,21,27],
  Eason:  [4,6,11,13,15,19,20,27,30],
  Jim:    [5,8,9,19,20,21,29],
  Jon:    [4,6,8,14,15,19,21,22,28,29],
  Shawn:  [1,5,6,12,19,20,28],
  Trevor: [4,8,12,17,19,20,25,30],
  Ian:    [5,6,7,11,15,20,26,27,29],
  Manson: [1,4,8,11,17,19,25,29],
  Peggy:  [6,7,13,14,19,20,21,27,28],
  Ann:    [19,21,27,29],
};

var KEY_SCH = 'wi26jun_sch_v5';
var KEY_SCV = 'wi26jun_scv_v5';

var schedule  = {};
var junScores = {};  // {name:[{day,amount,note}]}

// ════════════════════════════════════════
// State helpers
// ════════════════════════════════════════
function buildDefault() {
  schedule = {};
  for (var d=1;d<=30;d++) schedule[d]=[];
  Object.keys(DEFAULT_OFF).forEach(function(name){
    DEFAULT_OFF[name].forEach(function(d){
      if (schedule[d].indexOf(name)<0) schedule[d].push(name);
    });
  });
}

function loadState() {
  try { var s=localStorage.getItem(KEY_SCH); if(s) schedule=JSON.parse(s); else buildDefault(); }
  catch(e){ buildDefault(); }
  try { var v=localStorage.getItem(KEY_SCV); if(v) junScores=JSON.parse(v); }
  catch(e){ junScores={}; }
}

function saveState() {
  try {
    localStorage.setItem(KEY_SCH, JSON.stringify(schedule));
    localStorage.setItem(KEY_SCV, JSON.stringify(junScores));
  } catch(e){}
}

function getJunTotal(name) {
  return (junScores[name]||[]).reduce(function(s,e){return s+e.amount;},0);
}

function getJunUpTo(name, day) {
  return (junScores[name]||[]).filter(function(e){return e.day<=day;}).reduce(function(s,e){return s+e.amount;},0);
}

// ════════════════════════════════════════
// NAV
// ════════════════════════════════════════
function nav(p) {
  document.querySelectorAll('.page').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.nav-tab').forEach(function(el){el.classList.remove('active');});
  document.getElementById('page-'+p).classList.add('active');
  var idx={rank:0,score:1,schedule:2}[p];
  document.querySelectorAll('.nav-tab')[idx].classList.add('active');
  if (p==='score') renderScorePage();
  if (p==='schedule') renderSchGrid();
}

// ════════════════════════════════════════
// RANK PAGE
// ════════════════════════════════════════
var selDay = (function(){
  var t=new Date();
  return (t.getMonth()===5&&t.getFullYear()===2026)?t.getDate():1;
})();

function getRanking(day) {
  var isD1 = day===1;
  return COACHES
    .filter(function(c){ return !(c.joinDay && day < c.joinDay); })
    .map(function(c){
      return {
        name:  c.name,
        zh:    c.zh,
        score: isD1 ? c.may : getJunUpTo(c.name, day),
        isOff: (schedule[day]||[]).indexOf(c.name) >= 0,
      };
    })
    .sort(function(a,b){return b.score-a.score;});
}

function buildPicker() {
  var el=document.getElementById('dpicker'); el.innerHTML='';
  var today=new Date();
  for (var d=1;d<=30;d++) {
    var dow  = (FIRST6+d-1)%7;
    var isWe = dow>=5;
    var off  = (schedule[d]||[]).length;
    var isToday = today.getMonth()===5&&today.getFullYear()===2026&&today.getDate()===d;
    var btn = document.createElement('button');
    var cls = 'db';
    if (d===selDay) cls+=' active';
    if (isToday)   cls+=' today';
    if (off>0)     cls+=' has-off';
    if (isWe)      cls+=' we';
    btn.className=cls;
    btn.innerHTML='<span class="wd">'+WD6[dow]+'</span>'+d;
    btn.title = off>0 ? '休假：'+(schedule[d]||[]).join('、') : '';
    (function(dd,b){
      b.onclick=function(){
        selDay=dd;
        document.querySelectorAll('.db').forEach(function(x){x.classList.remove('active');});
        b.classList.add('active');
        renderDay(dd);
      };
    })(d,btn);
    el.appendChild(btn);
  }
}

function renderDay(d) {
  var rank = getRanking(d);
  var on   = rank.filter(function(c){return !c.isOff;});
  var off  = rank.filter(function(c){return c.isOff;});
  var isD1 = d===1;
  var dow  = WD6[(FIRST6+d-1)%7];

  // mode badge
  document.getElementById('mode-badge').textContent = isD1?'依5月業績排序':'依6月累計排序';
  document.getElementById('mode-badge').className   = 'mode-badge '+(isD1?'mode-may':'mode-jun');

  // title
  document.getElementById('rank-title').innerHTML =
    '6月'+d+'日（週'+dow+'）<small>'+(isD1?'以5月累計業績為排序基準':'依本月累計業績即時排序')+'</small>';

  // stats
  var top = on[0];
  document.getElementById('stats').innerHTML =
    '<div class="stat"><div class="lbl">今日出勤</div><div class="val">'+on.length+'<span style="font-size:14px;font-weight:400;color:var(--text3);"> 人</span></div></div>'+
    '<div class="stat"><div class="lbl">今日休假</div><div class="val">'+off.length+'<span style="font-size:14px;font-weight:400;color:var(--text3);"> 人</span></div></div>'+
    '<div class="stat"><div class="lbl">第一順位</div>'+
      '<div class="val sm">'+(top?top.name+' '+top.zh:'—')+'</div>'+
      (top?'<div class="sub">'+(isD1?'5月':'6月')+' '+top.score.toLocaleString()+' 元</div>':'')+
    '</div>';

  // list
  var el=document.getElementById('rank-list'); el.innerHTML='';
  if (!on.length) {
    el.innerHTML='<div class="empty-st"><span class="ico">🌙</span>本日全員休假</div>';
    return;
  }
  on.forEach(function(c,i){
    var r=i+1;
    var gc=r===1?' r1':r===2?' r2':r===3?' r3':'';
    var bc=r===1?' rb1':r===2?' rb2':r===3?' rb3':'';
    var medal=r===1?'🥇':r===2?'🥈':r===3?'🥉':r;
    var row=document.createElement('div'); row.className='rrow'+gc;
    row.innerHTML=
      '<div class="rbadge'+bc+'">'+medal+'</div>'+
      '<div><span class="rname">'+c.name+'</span><span class="rname-zh">'+c.zh+'</span></div>'+
      '<div class="rscore"><div class="amt">'+c.score.toLocaleString()+'</div><div class="lbl">'+(isD1?'5月累計':'6月累計')+'</div></div>';
    el.appendChild(row);
  });
  if (off.length) {
    var sep=document.createElement('div'); sep.className='off-div';
    sep.innerHTML='🌙 本日休假（不排入 WI 接待順位）';
    el.appendChild(sep);
    off.forEach(function(c){
      var row=document.createElement('div'); row.className='rrow-off';
      row.innerHTML='<div class="rbadge">—</div>'+
        '<div><span class="rname">'+c.name+'</span><span class="rname-zh">'+c.zh+'</span></div>'+
        '<span class="off-pill">休假</span>';
      el.appendChild(row);
    });
  }
}

// ════════════════════════════════════════
// SCORE PAGE
// ════════════════════════════════════════
function populateSel(id) {
  document.getElementById(id).innerHTML =
    COACHES.map(function(c){return '<option value="'+c.name+'">'+c.name+'　'+c.zh+'</option>';}).join('');
}

function addScore() {
  var day  = parseInt(document.getElementById('s-day').value);
  var name = document.getElementById('s-coach').value;
  var amt  = parseInt(document.getElementById('s-amt').value);
  var note = document.getElementById('s-note').value.trim();
  if (!day||day<2||day>30||!amt||amt<=0) { alert('請填寫正確日期(2~30)與金額'); return; }
  if (!junScores[name]) junScores[name]=[];
  junScores[name].push({day:day,amount:amt,note:note});
  saveState();
  document.getElementById('s-amt').value='';
  document.getElementById('s-note').value='';
  flash('score-alert');
  renderScorePage();
  buildPicker();
  renderDay(selDay);
}

function delScore(name,idx) {
  junScores[name].splice(idx,1);
  saveState(); renderScorePage(); buildPicker(); renderDay(selDay);
}

function renderScorePage() {
  var tbody=document.getElementById('score-body'); tbody.innerHTML='';
  var total=0, cnt=0;
  COACHES.forEach(function(c){
    (junScores[c.name]||[]).forEach(function(e,i){
      total+=e.amount; cnt++;
      var tr=document.createElement('tr');
      tr.innerHTML=
        '<td style="font-family:\'DM Mono\',monospace;font-size:12px;">6/'+e.day+'</td>'+
        '<td><strong>'+c.name+'</strong> <small style="color:var(--text3);">'+c.zh+'</small></td>'+
        '<td style="color:var(--text3);font-size:12px;">'+(e.note||'—')+'</td>'+
        '<td style="font-family:\'DM Mono\',monospace;font-weight:600;">'+e.amount.toLocaleString()+'</td>'+
        '<td><button class="btn btn-danger btn-sm" onclick="delScore(\''+c.name+'\','+i+')">刪除</button></td>';
      tbody.appendChild(tr);
    });
  });
  if (!cnt) tbody.innerHTML='<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:2rem;">尚無6月業績資料</td></tr>';
  document.getElementById('jun-total').textContent = cnt ? '共 '+cnt+' 筆，合計 '+total.toLocaleString()+' 元' : '';

  var sorted=[...COACHES].filter(function(c){return c.may>0;}).sort(function(a,b){return b.may-a.may;});
  document.getElementById('may-body').innerHTML=sorted.map(function(c,i){
    return '<tr><td><strong>'+(i+1)+'</strong></td>'+
      '<td><strong>'+c.name+'</strong> <small style="color:var(--text3);">'+c.zh+'</small></td>'+
      '<td style="font-family:\'DM Mono\',monospace;font-weight:600;">'+c.may.toLocaleString()+' <small style="color:var(--text3);">元</small></td></tr>';
  }).join('');
}

// ════════════════════════════════════════
// SCHEDULE PAGE
// ════════════════════════════════════════
function renderSchGrid() {
  var wrap=document.getElementById('sch-wrap');
  var html='<table class="sch-t"><thead><tr><th class="nc">教練</th>';
  for (var d=1;d<=30;d++){
    var dow=(FIRST6+d-1)%7, isWe=dow>=5;
    html+='<th class="'+(isWe?'weh':'')+'"><div style="font-size:9px;font-weight:400;">'+WD6[dow]+'</div>'+d+'</th>';
  }
  html+='</tr></thead><tbody>';

  COACHES.forEach(function(c){
    html+='<tr><td class="nc">'+c.name+'<br><small style="color:var(--text3);font-weight:400;">'+c.zh+'</small></td>';
    for (var d=1;d<=30;d++){
      var dow=(FIRST6+d-1)%7, isWe=dow>=5;
      var notJoined = c.joinDay && d < c.joinDay;
      var isOff = (schedule[d]||[]).indexOf(c.name)>=0;
      html+='<td class="'+(isWe?'wed':'')+'"><div class="sch-cell'+(isOff?' off':'')+'" ';
      if (notJoined) {
        html+='style="opacity:.15;cursor:default;background:var(--bg);" ';
      } else {
        html+='onclick="toggleCell(\''+c.name+'\','+d+')" ';
      }
      html+='id="sc-'+c.name+'-'+d+'">'+(isOff?'休':'')+'</div></td>';
    }
    html+='</tr>';
  });
  html+='</tbody></table>';
  wrap.innerHTML=html;
}

function toggleCell(name,d){
  if (!schedule[d]) schedule[d]=[];
  var idx=schedule[d].indexOf(name);
  if (idx>=0) schedule[d].splice(idx,1); else schedule[d].push(name);
  var cell=document.getElementById('sc-'+name+'-'+d);
  var isOff=schedule[d].indexOf(name)>=0;
  cell.className='sch-cell'+(isOff?' off':'');
  cell.textContent=isOff?'休':'';
}

function saveSchedule(){
  saveState();
  buildPicker();
  renderDay(selDay);
  flash('sch-alert');
}

function resetDefault(){
  if (!confirm('確定還原為班表預設休假？')) return;
  buildDefault();
  saveState();
  renderSchGrid();
  buildPicker();
  renderDay(selDay);
}

function batchSet(){
  var name=document.getElementById('b-coach').value;
  var raw=document.getElementById('b-days').value;
  raw.split(',').forEach(function(s){
    var d=parseInt(s.trim());
    if (d>=1&&d<=30){ if(!schedule[d])schedule[d]=[]; if(schedule[d].indexOf(name)<0) schedule[d].push(name); }
  });
  document.getElementById('b-days').value='';
  renderSchGrid();
}

function batchClear(){
  var name=document.getElementById('b-coach').value;
  for(var d=1;d<=30;d++) if(schedule[d]) schedule[d]=schedule[d].filter(function(n){return n!==name;});
  renderSchGrid();
}

function flash(id){
  var el=document.getElementById(id); el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},2500);
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
function init(){
  var now=new Date();
  document.getElementById('nav-date').textContent=
    now.getFullYear()+'/'+(String(now.getMonth()+1).padStart(2,'0'))+'/'+String(now.getDate()).padStart(2,'0');
  loadState();
  populateSel('s-coach');
  populateSel('b-coach');
  buildPicker();
  renderDay(selDay);
}
init();
</script>
</body>
</html>
